name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 📍 استخدام إصدار دقيق جداً لضمان عدم حدوث خطأ "Version does not exist"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0.2'

      # 📍 أمر سحري: إذا لم يجد ملف التشغيل، سيقوم بإنشائه فوراً
      - name: Build with Gradle
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AntarSabr-VPN-Final
          path: app/build/outputs/apk/debug/*.apk
