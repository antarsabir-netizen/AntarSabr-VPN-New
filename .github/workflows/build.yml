name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 📍 هذا الجزء سيقوم بتثبيت Gradle بدلاً من البحث عن ملف gradlew الناقص
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.0

      - name: Build with Gradle
        # 📍 نستخدم 'gradle' مباشرة بدلاً من './gradlew'
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AntarSabr-VPN-Final
          path: app/build/outputs/apk/debug/*.apk
