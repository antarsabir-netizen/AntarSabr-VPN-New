apply plugin: 'com.android.application'

android {
    namespace "com.antarsabr.vpn"
    compileSdk 34
    defaultConfig {
        applicationId "com.antarsabr.vpn"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'com.github.pro-vpn:openvpn-api:1.0.5' // المكتبة الجاهزة
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
